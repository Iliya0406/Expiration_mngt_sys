<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Expiry Reminder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <h1 style="color: green;">Expiration Management System</h1>
    <h1 style="color: green;">for Household Items</h1>
    
    <form id="foodForm">
      <input type="text" id="itemName" placeholder="Food item name" required>
      <input type="date" id="expiryDate" required>
      <button type="submit">Add Item</button>
    </form>

    <h3 class="underline">My Food Items and Their Expiring Dates</h3>
    <ul id="foodList"></ul>

    <h3 class="underline" style="color: red;">Reminders</h3>
    <div id="reminders"></div>
    <h4>Ayawal Blessing Samuel U23/CPS/2004</h4>
  </div>   

  <script src="script.js"></script>
</body>
</html>
